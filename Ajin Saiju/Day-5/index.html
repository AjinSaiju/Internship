<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Pro</title>

<link rel="stylesheet" href="asset/css/style.css    ">
</head>

<body>

<div class="container">

    <h1>🎮 Tic Tac Toe</h1>

    <!-- Player Setup -->
    <div class="setup">
        <input type="text" id="playerX" placeholder="Player X Name">
        <input type="text" id="playerO" placeholder="Player O Name">
        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- Status -->
    <div id="status">Enter player names to start</div>

    <!-- Scoreboard -->
    <div class="scoreboard">
        <span id="scoreX">X: 0</span>
        <span id="scoreO">O: 0</span>
        <span id="draws">Draws: 0</span>
    </div>

    <!-- Board -->
    <div class="board" id="board">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
    </div>

    <!-- Buttons -->
    <div class="controls">
        <button onclick="resetBoard()">Reset Round</button>
        <button onclick="newGame()">New Game</button>
    </div>

</div>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = false;

let playerNames = { X: "Player X", O: "Player O" };
let scores = { X: 0, O: 0, draw: 0 };

const statusText = document.getElementById("status");
const cells = document.querySelectorAll(".cell");

const winConditions = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function startGame() {
    const px = document.getElementById("playerX").value || "Player X";
    const po = document.getElementById("playerO").value || "Player O";

    playerNames.X = px;
    playerNames.O = po;

    gameActive = true;
    statusText.innerText = `${playerNames[currentPlayer]}'s Turn`;
}

cells.forEach(cell => cell.addEventListener("click", handleClick));

function handleClick(e) {
    const index = e.target.dataset.i;

    if (!gameActive || board[index] !== "") return;

    board[index] = currentPlayer;
    e.target.innerText = currentPlayer;

    checkWinner();

    currentPlayer = currentPlayer === "X" ? "O" : "X";

    if (gameActive) {
        statusText.innerText = `${playerNames[currentPlayer]}'s Turn`;
    }
}

function checkWinner() {
    for (let condition of winConditions) {
        const [a,b,c] = condition;

        if (board[a] && board[a] === board[b] && board[a] === board[c]) {

            highlight(a,b,c);

            statusText.innerText = `🏆 ${playerNames[currentPlayer]} Wins!`;
            scores[currentPlayer]++;
            updateScore();
            gameActive = false;
            return;
        }
    }

    if (!board.includes("")) {
        statusText.innerText = "😐 Draw!";
        scores.draw++;
        updateScore();
        gameActive = false;
    }
}

function highlight(a,b,c) {
    cells[a].classList.add("win");
    cells[b].classList.add("win");
    cells[c].classList.add("win");
}

function updateScore() {
    document.getElementById("scoreX").innerText =
        `${playerNames.X}: ${scores.X}`;

    document.getElementById("scoreO").innerText =
        `${playerNames.O}: ${scores.O}`;

    document.getElementById("draws").innerText =
        `Draws: ${scores.draw}`;
}

function resetBoard() {
    board = ["","","","","","","","",""];
    gameActive = true;
    currentPlayer = "X";

    cells.forEach(cell => {
        cell.innerText = "";
        cell.classList.remove("win");
    });

    statusText.innerText = `${playerNames[currentPlayer]}'s Turn`;
}

function newGame() {
    scores = { X:0, O:0, draw:0 };
    updateScore();
    resetBoard();
}
</script>

</body>
</html>
